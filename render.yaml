services:
  - type: web
    name: multi-agent-ai-customer-support-backend
    env: python
    plan: free
    region: oregon
    pythonVersion: 3.12.9 
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production

